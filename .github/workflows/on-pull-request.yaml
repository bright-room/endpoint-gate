name: on-pull-request

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Spotless Check
        uses: ./.github/actions/gradle-action
        with:
          command: spotlessCheck

  javadoc:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Javadoc Check
        uses: ./.github/actions/gradle-action
        with:
          command: javadoc

  unit-test:
    needs: [lint, javadoc]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Unit Test
        uses: ./.github/actions/gradle-action
        with:
          command: test

  integration-test:
    needs: [lint, javadoc]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Integration Test
        uses: ./.github/actions/gradle-action
        with:
          command: integrationTest
