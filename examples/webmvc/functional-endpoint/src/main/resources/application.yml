endpoint-gate:
  gates:
    stable-api:
      enabled: true
    beta-api:
      enabled: true
      rollout: 50
    experimental-api:
      enabled: false
    internal-api:
      enabled: true
      condition: "headers['X-Internal'] == 'true'"
    preview-feature:
      enabled: true
      condition: "params['preview'] == 'true'"
      rollout: 30
