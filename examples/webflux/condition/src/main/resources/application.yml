endpoint-gate:
  condition:
    fail-on-error: true
  gates:
    internal-api:
      enabled: true
      condition: "headers['X-Internal-Token'] == 'secret-token'"
    beta-feature:
      enabled: true
      condition: "params['beta'] == 'true'"
    admin-panel:
      enabled: true
      condition: "headers['X-User-Role'] == 'admin'"
